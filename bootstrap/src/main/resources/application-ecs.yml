# ECS (Copilot) Environment Configuration

server:
  port: 8003

spring:
  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      database: 0

  datasource:
    url: jdbc:mysql://${DBHOST}:${DBPORT:3306}/${DBNAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=true&requireSSL=false&createDatabaseIfNotExist=true
    username: ${DBUSERNAME}
    password: ${DBPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 3
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      banner: false

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:7200}
    issuer: awsome-shop-point-service
  login:
    max-failed-attempts: 5
    lock-duration: 1800

shop:
  security:
    encryption:
      key: ${ENCRYPTION_KEY}

logging:
  level:
    root: INFO
    com.awsome: INFO
